---
deployment:
  tasks:
    - export DEPLOYPATH=/home/your_cpanel_username/public_html/
    - /bin/cp -R .next $DEPLOYPATH
    - /bin/cp -R public $DEPLOYPATH
    - /bin/cp -R node_modules $DEPLOYPATH
    - /bin/cp package.json $DEPLOYPATH
    - /bin/cp server.js $DEPLOYPATH
    - /bin/cp ecosystem.config.js $DEPLOYPATH